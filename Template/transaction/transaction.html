{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transacciones</title>
    <link rel="stylesheet" href="{% static 'css/datatables.css' %}" />
    <link rel="stylesheet" href="{% static 'css/tooltip2.css' %}" />
    <script src="{% static 'css/DataTables/datatables.js' %}"></script>
    <script src="{% static 'css/js/jszip.min.js' %}"></script>
    <script src="{% static 'css/js/pdfmake.min.js' %}"></script>
    <script src="{% static 'css/js/js/vfs_fonts.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script
      src="https://code.jquery.com/jquery-3.7.1.min.js"
      integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="hold-transition sidebar-mini">
    <div class="wrapper">
      {% include 'header.html' %} {% include 'aside.html' %}
      <!-- Content -->
      <div class="content-wrapper">
        <div class="content">
          <div class="container-fluid">
            <main class="data-table">
              <h1>Listado de Transacciones</h1>
              <table id="DataTable">
                <thead>
                  <tr>
                    <th>Monto Bs</th>
                    <th>Referencia</th>
                    <th>C. Banco</th>
                    <th>Telefono</th>
                    <th>Status</th>
                    <th>Tipo</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
              </table>
            </main>
          </div>
        </div>
      </div>
    </div>
  </body>

  <!-- Scripts -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="/static/js/datatables.js"></script>
  <script>
    const API_URL = "/api/transacciones/all_transaction/"; // Asegúrate de la barra al final

    $(document).ready(function () {
      $("#DataTable").DataTable({
        responsive: true,
        dom: '<"table-options"<"lb-container"lB>fr>tip',
        lengthMenu: [10, 25, 50, -1],
        buttons: [
          {
            extend: "excel",
            filename: "ConductoresEXCEL",
            exportOptions: {
              columns: [0, 1, 2, 3, 4],
            },
          },
          {
            extend: "pdf",
            filename: "ConductoresPDF",
            exportOptions: {
              columns: [0, 1, 2, 3, 4],
            },
          },
        ],
        ajax: {
          url: API_URL,
          type: "GET",
          dataSrc: function (json) {
            // Si usas la versión simple
            if (json.data) {
              return json.data;
            }
            // Si usas la versión con paginación
            if (json.data && Array.isArray(json.data)) {
              return json.data;
            }
            console.error("Formato de datos inesperado:", json);
            return [];
          },
          error: function (xhr, status, error) {
            console.error("Error en la petición:", error);
            console.error("Status:", status);
            console.error("Respuesta:", xhr.responseText);
            alert("Error al cargar los datos. Revisa la consola.");
          },
        },
        columns: [
          { data: "amount_bs", defaultContent: "" },
          { data: "origin_bank_reference", defaultContent: "" },
          { data: "origin_bank_code", defaultContent: "" },
          { data: "client_phone", defaultContent: "" },
          { data: "status", defaultContent: "" },
          { data: "type", defaultContent: "" },
          { data: "created_at", defaultContent: "" },

          {
            data: null,
            searchable: false,
            orderable: false,
            render: function (data) {
              return `    {% if is_admin %}
                            <button class='actions edit' data-id='${data.public_id || data.id}'>
                                <svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='currentColor' class='bi bi-check2-circle' viewBox='0 0 16 16'><path d='M2.5 8a5.5 5.5 0 0 1 8.25-4.764.5.5 0 0 0 .5-.866A6.5 6.5 0 1 0 14.5 8a.5.5 0 0 0-1 0 5.5 5.5 0 1 1-11 0'/><path d='M15.354 3.354a.5.5 0 0 0-.708-.708L8 9.293 5.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0z'/></svg></button>

                            {% endif %}
                        `;
            },
          },
        ],
        initComplete: function () {
          // Delegación de eventos para botones
          $("#DataTable tbody").on("click", ".edit", function () {
            var id = $(this).data("id");
            if (id) {
              window.location.href = "" + id;
            } else {
              console.error("ID no encontrado");
            }
          });
        },
      });
    });
  </script>
</html>
