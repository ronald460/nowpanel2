<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | NowApp</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="hold-transition sidebar-mini">
    <div class="wrapper">
      {% include 'header.html' %} {% include 'aside.html' %}
      <!-- Content -->
      <div class="content-wrapper">
        <div class="content-header">
          <div class="container-fluid">
            <h1 class="m-0">Panel Now</h1>
          </div>
        </div>

        <div class="content">
          <div class="container-fluid">
            <div class="row" id="stats-cards">
              <!-- Aquí se cargarán las tarjetas dinámicamente -->
            </div>

            <div class="row">
              <div class="col-md-6">
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">Viajes últimos 7 días</h3>
                  </div>
                  <div class="card-body">
                    <canvas id="viajesChart" height="200"> </canvas>
                  </div>
                </div>
              </div>
              <div class="col-md-6">
                <div class="card">
                  <div class="card-header">
                    <h3 class="card-title">Últimos usuarios</h3>
                  </div>
                  <div class="card-body table-responsive p-0">
                    <table class="table table-hover text-nowrap">
                      <thead>
                        <tr>
                          <th>Nombre</th>
                          <th>Email</th>
                          <th>Fecha</th>
                        </tr>
                      </thead>
                      <tbody id="tabla-usuarios"></tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const API_URL = "";

      // Cargar estadísticas desde la API de Django
      async function cargarStats() {
        const response = await fetch("/api/dashboard/stats/");
        const stats = await response.json();

        const cardsHtml = `
      <div class="col-lg-3 col-6">
        <div class="small-box bg-info">
          <div class="inner">
            <h3>${stats.all_users}</h3>
            <p>Usuarios Totales</p>
          </div>
          <div class="icon"><i class="fas fa-users"></i></div>
        </div>
      </div>
      <div class="col-lg-3 col-6">
        <div class="small-box bg-success">
          <div class="inner">
            <h3>${stats.all_driver}</h3>
            <p>Conductores</p>
          </div>
          <div class="icon"><i class="fas fa-car"></i></div>
        </div>
      </div>
      <div class="col-lg-3 col-6">
        <div class="small-box bg-warning">
          <div class="inner">
            <h3>${stats.driver_moto}</h3>
            <p>Motorizados Trabajando</p>
          </div>
          <div class="icon"><i class="fas fa-taxi"></i></div>
        </div>
      </div>
      <div class="col-lg-3 col-6">
        <div class="small-box bg-danger">
          <div class="inner"><h3>${stats.driver_car}</h3><p>Carros Trabajando</p></div>
          <div class="icon"><i class="fas fa-clock"></i></div>
        </div>
      </div>
    `;
        document.getElementById("stats-cards").innerHTML = cardsHtml;
      }

      async function cargarUsuarios() {
        const response = await fetch("/api/usuarios/result/");
        const usuarios = await response.json();

        const html = usuarios
          .map(
            (u) => `
      <tr>
        <td>${u.name || "Sin nombre"}</td>
        <td>${u.email}</td>
        <td>${new Date(u.created_at).toLocaleDateString()}</td>
      </tr>
    `,
          )
          .join("");

        document.getElementById("tabla-usuarios").innerHTML = html;
      }

      // Cargar todo
      cargarStats();
      cargarUsuarios();

      // Auto-refresh cada 30 segundos
      setInterval(() => {
        cargarStats();
        cargarUsuarios();
      }, 30000);
    </script>
  </body>
</html>
